<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>🌻 내 돈</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fffdf0;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:#1a1a1a;}
#app{max-width:420px;margin:0 auto;min-height:100vh;padding-bottom:60px;}
/* header */
.header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px 14px;border-bottom:2px solid #ffe9a0;background:#fffbe6;}
.header-title{font-size:21px;font-weight:800;color:#7a5c00;}
/* tabs */
.tabs{display:flex;background:#fffbe6;border-bottom:2px solid #ffe9a0;}
.tab{flex:1;padding:12px 4px;background:transparent;border:none;color:#b8a040;font-size:12px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
.tab.active{color:#7a5c00;border-bottom:3px solid #d4a017;background:#fffef5;}
/* panel */
.panel{padding:22px 20px 20px;display:none;}
.panel.active{display:block;}
.big-label{font-size:11px;color:#b8a040;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;font-weight:600;}
.big-num{font-size:48px;font-weight:800;letter-spacing:-0.02em;line-height:1.1;margin-bottom:2px;}
.won{font-size:20px;font-weight:600;margin-left:3px;opacity:.6;}
.korean-hint{font-size:12px;color:#b8a040;margin-bottom:16px;font-weight:500;min-height:16px;}
.bar-track{height:8px;background:#ffe9a0;border-radius:99px;overflow:hidden;margin-bottom:8px;}
.bar-fill{height:100%;border-radius:99px;transition:width .5s;}
.bar-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.meta-text{font-size:12px;color:#b8a040;}
.link-btn{background:transparent;border:none;color:#d4a017;font-size:12px;cursor:pointer;text-decoration:underline;font-weight:600;}
.pink-btn{width:100%;background:linear-gradient(135deg,#f5c842,#d4a017);border:none;color:#5a3e00;border-radius:14px;padding:15px 0;font-size:15px;font-weight:800;cursor:pointer;margin-bottom:10px;box-shadow:0 4px 14px #f5c84244;}
.dash-btn{width:100%;background:#fffbe6;border:2px dashed #ffd966;color:#b8a040;border-radius:12px;padding:11px 0;font-size:13px;cursor:pointer;font-weight:600;margin-bottom:20px;}
.pill-btn{background:#f5c842;border:none;color:#5a3e00;border-radius:20px;padding:8px 16px;font-size:13px;cursor:pointer;font-weight:700;box-shadow:0 2px 8px #f5c84244;}
/* recent */
.recent-wrap{background:#fff;border:2px solid #ffe9a0;border-radius:16px;padding:14px 16px;}
.recent-title{font-size:11px;color:#b8a040;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
.recent-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #fffdf0;}
.r-date{font-size:12px;color:#b8a040;min-width:32px;}
.r-cat{font-size:13px;color:#888;flex:1;}
.r-amt{font-size:13px;font-weight:800;color:#7a5c00;}
/* cat summary */
.cat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.cat-box{background:#fff;border:2px solid #ffe9a0;border-radius:14px;padding:12px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;}
.cat-emoji{font-size:18px;}
.cat-name{font-size:11px;color:#b8a040;font-weight:600;}
.cat-amt{font-size:13px;font-weight:800;}
/* exp list */
.empty{text-align:center;color:#b8a040;font-size:14px;padding:40px 0;}
.exp-row{display:flex;justify-content:space-between;align-items:center;background:#fff;border:2px solid #ffe9a0;border-radius:14px;padding:13px 14px;margin-bottom:8px;}
.exp-left{display:flex;align-items:center;gap:10px;}
.exp-emoji{font-size:22px;}
.exp-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;}
.exp-date{font-size:11px;color:#b8a040;}
.exp-amt{font-size:14px;font-weight:800;color:#7a5c00;}
.edit-btn{background:#fffbe6;border:1px solid #ffe9a0;color:#d4a017;border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:700;}
/* bonus */
.bonus-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px;}
.bonus-item{background:#fff;border:2px solid #ffe9a0;border-radius:16px;padding:20px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;}
.bonus-icon{font-size:14px;font-weight:700;}
.bonus-min{font-size:11px;color:#d4a017;font-weight:600;}
.savings-note{margin-top:24px;color:#b8a040;font-size:14px;line-height:2;text-align:center;background:#fffbe6;border-radius:16px;padding:20px;border:2px solid #ffe9a0;}
/* modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(180,80,100,.15);align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(3px);}
.overlay.show{display:flex;}
.modal{background:#fff;border:2px solid #ffe9a0;border-radius:24px 24px 0 0;padding:24px 20px 36px;width:100%;max-width:420px;max-height:88vh;overflow-y:auto;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-title{font-size:16px;font-weight:800;color:#7a5c00;}
.close-btn{background:#fffbe6;border:none;color:#d4a017;font-size:15px;cursor:pointer;border-radius:8px;width:30px;height:30px;font-weight:700;}
.step-label{font-size:12px;color:#b8a040;font-weight:700;letter-spacing:.05em;margin-bottom:8px;margin-top:4px;}
.input-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.main-input{flex:1;background:#fffdf0;border:2px solid #ffe9a0;border-radius:12px;color:#1a1a1a;font-size:30px;font-weight:800;padding:13px 14px;outline:none;width:100%;}
.input-unit{color:#b8a040;font-size:14px;font-weight:600;}
.korean-input{font-size:12px;color:#b8a040;font-weight:500;padding-left:4px;margin-bottom:14px;min-height:16px;}
.cat-select{display:flex;gap:8px;margin-bottom:10px;}
.cat-btn{flex:1;background:#fffdf0;border:2px solid #ffe9a0;color:#b8a040;border-radius:12px;padding:12px 4px;font-size:13px;cursor:pointer;font-weight:700;}
.cat-btn.active-필수{background:#d4a017;border-color:#d4a017;color:#fff;}
.cat-btn.active-여유{background:#f5c842;border-color:#f5c842;color:#fff;}
.cat-btn.active-충동{background:#f5a623;border-color:#f5a623;color:#fff;}
.cat-hint{background:#fffdf0;border:1px solid #ffe9a0;border-radius:10px;padding:10px 14px;font-size:12px;color:#b8a040;margin-bottom:16px;font-weight:500;line-height:1.5;}
.warn-box{background:#fff8cc;border:2px solid #ffd966;border-radius:10px;padding:10px 14px;font-size:13px;color:#cc2222;font-weight:700;margin-bottom:12px;text-align:center;}
.preview-box{background:#fffdf0;border-radius:12px;padding:12px 14px;font-size:13px;color:#b8a040;line-height:2.2;margin-bottom:14px;white-space:pre-line;border:1px solid #ffe9a0;font-weight:600;}
.income-types{display:flex;gap:8px;margin-bottom:16px;}
.type-btn{flex:1;background:#fffdf0;border:2px solid #ffe9a0;color:#b8a040;border-radius:12px;padding:11px 6px;font-size:12px;cursor:pointer;font-weight:700;}
.type-btn.active{border-color:#f5c842;color:#7a5c00;background:#fffbe6;}
.btn-row{display:flex;gap:10px;margin-top:4px;}
.confirm-btn{flex:1;background:linear-gradient(135deg,#f5c842,#d4a017);color:#fff;border:none;border-radius:14px;padding:16px 0;font-size:15px;font-weight:800;cursor:pointer;}
.delete-btn{flex:0 0 76px;background:#ffdddd;color:#cc2222;border:none;border-radius:14px;padding:16px 0;font-size:15px;font-weight:800;cursor:pointer;}
/* flash */
.flash{display:none;position:fixed;top:16px;left:50%;transform:translateX(-50%);border-radius:20px;padding:11px 22px;font-size:13px;font-weight:700;z-index:200;white-space:nowrap;}
.flash.show{display:block;}
</style>
</head>
<body>
<div id="app">
  <!-- flash -->
  <div class="flash" id="flash"></div>

  <!-- header -->
  <div class="header">
    <span class="header-title">🌻 내 돈</span>
    <button class="pill-btn" onclick="openModal('income')">+ 수입</button>
  </div>

  <!-- tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('living',this)">💰 생활비</button>
    <button class="tab" onclick="switchTab('expense',this)">📋 지출</button>
    <button class="tab" onclick="switchTab('bonus',this)">🎀 보너스</button>
    <button class="tab" onclick="switchTab('savings',this)">🏦 저축</button>
  </div>

  <!-- 생활비 -->
  <div class="panel active" id="panel-living">
    <div class="big-label">남은 돈</div>
    <div class="big-num" id="living-bal" style="color:#d4a017">0<span class="won">원</span></div>
    <div class="korean-hint" id="living-korean"></div>
    <div class="bar-track"><div class="bar-fill" id="living-bar" style="width:100%;background:#d4a017"></div></div>
    <div class="bar-meta">
      <span class="meta-text" id="living-goal-text"></span>
      <button class="link-btn" onclick="openGoalModal()">수정</button>
    </div>
    <button class="pink-btn" onclick="openExpModal()">+ 지출 입력</button>
    <button class="dash-btn" onclick="openMonthEnd()">🗓 월말 정산</button>
    <div id="recent-wrap" style="display:none">
      <div class="recent-wrap">
        <div class="recent-title">최근 지출</div>
        <div id="recent-list"></div>
      </div>
    </div>
  </div>

  <!-- 지출 -->
  <div class="panel" id="panel-expense">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="big-label">지출 내역</div>
      <button class="pill-btn" onclick="openExpModal()">+ 지출</button>
    </div>
    <div class="cat-row" id="cat-summary"></div>
    <div id="exp-list"></div>
  </div>

  <!-- 보너스 -->
  <div class="panel" id="panel-bonus">
    <div class="big-label">보너스 슬롯</div>
    <div class="big-num" id="bonus-bal" style="color:#1a1a1a">0<span class="won">원</span></div>
    <div class="korean-hint" id="bonus-korean"></div>
    <div class="bonus-grid">
      <button class="bonus-item" onclick="handleBonus('🧘 필라테스',0)"><span class="bonus-icon">🧘 필라테스</span></button>
      <button class="bonus-item" onclick="handleBonus('💇 미용',0)"><span class="bonus-icon">💇 미용</span></button>
      <button class="bonus-item" onclick="handleBonus('✈️ 여행',0)"><span class="bonus-icon">✈️ 여행</span></button>
      <button class="bonus-item" id="bonus-luxury" onclick="handleBonus('💎 사치',1000000)">
        <span class="bonus-icon">💎 사치</span>
        <span class="bonus-min">100만원↑</span>
      </button>
    </div>
    <button class="pink-btn" style="margin-top:20px" onclick="openModal('deduct-bonus')">직접 차감</button>
  </div>

  <!-- 저축 -->
  <div class="panel" id="panel-savings">
    <div class="big-label">저축</div>
    <div class="big-num" id="savings-bal" style="color:#1a1a1a">0<span class="won">원</span></div>
    <div class="korean-hint" id="savings-korean"></div>
    <div class="savings-note">자동으로 쌓이는 돈이에요 🔒<br>수정할 수 없어요</div>
  </div>
</div>

<!-- 지출 입력 모달 -->
<div class="overlay" id="modal-addExp">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">✏️ 지출 입력</span>
      <button class="close-btn" onclick="closeModal('addExp')">✕</button>
    </div>
    <div class="step-label">① 금액</div>
    <div class="input-row">
      <input class="main-input" id="exp-amount-input" type="text" inputmode="numeric" placeholder="0"
        oninput="onAmtInput(this,'exp-korean')">
      <span class="input-unit">원</span>
    </div>
    <div class="korean-input" id="exp-korean"></div>
    <div class="step-label">② 카테고리</div>
    <div class="cat-select" id="exp-cat-select">
      <button class="cat-btn active-필수" onclick="selectCat(this,'필수','exp')">🍚 필수</button>
      <button class="cat-btn" onclick="selectCat(this,'여유','exp')">🙂 여유</button>
      <button class="cat-btn" onclick="selectCat(this,'충동','exp')">🔥 충동</button>
    </div>
    <div class="cat-hint" id="exp-cat-hint">💬 이거 안 사면 생활에 문제 생김</div>
    <div class="warn-box" id="exp-warn" style="display:none">잔액이 부족합니다. 💸</div>
    <button class="confirm-btn" onclick="submitExp()">기록하기 ✅</button>
  </div>
</div>

<!-- 지출 수정 모달 -->
<div class="overlay" id="modal-editExp">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">✏️ 지출 수정</span>
      <button class="close-btn" onclick="closeModal('editExp')">✕</button>
    </div>
    <div class="step-label">① 금액</div>
    <div class="input-row">
      <input class="main-input" id="edit-amount-input" type="text" inputmode="numeric" placeholder="0"
        oninput="onAmtInput(this,'edit-korean')">
      <span class="input-unit">원</span>
    </div>
    <div class="korean-input" id="edit-korean"></div>
    <div class="step-label">② 카테고리</div>
    <div class="cat-select" id="edit-cat-select">
      <button class="cat-btn" onclick="selectCat(this,'필수','edit')">🍚 필수</button>
      <button class="cat-btn" onclick="selectCat(this,'여유','edit')">🙂 여유</button>
      <button class="cat-btn" onclick="selectCat(this,'충동','edit')">🔥 충동</button>
    </div>
    <div class="cat-hint" id="edit-cat-hint">💬 이거 안 사면 생활에 문제 생김</div>
    <div class="btn-row">
      <button class="confirm-btn" onclick="submitEdit()">저장 ✏️</button>
      <button class="delete-btn" onclick="submitDelete()">삭제 🗑</button>
    </div>
  </div>
</div>

<!-- 수입 입력 모달 -->
<div class="overlay" id="modal-income">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">💸 수입 입력</span>
      <button class="close-btn" onclick="closeModal('income')">✕</button>
    </div>
    <div class="income-types">
      <button class="type-btn active" id="itype-night" onclick="selectIncomeType('night')">🌙 나이트</button>
      <button class="type-btn" id="itype-duty" onclick="selectIncomeType('duty')">🏥 당직비</button>
      <button class="type-btn" id="itype-bonus-income" onclick="selectIncomeType('bonus-income')">🎁 상여금</button>
    </div>
    <div class="input-row">
      <input class="main-input" id="income-input" type="text" inputmode="numeric" placeholder="0"
        oninput="onAmtInput(this,'income-korean');updateIncomePreview()">
      <span class="input-unit">원</span>
    </div>
    <div class="korean-input" id="income-korean"></div>
    <div class="preview-box" id="income-preview" style="display:none"></div>
    <button class="confirm-btn" onclick="submitIncome()">분배하기 🎉</button>
  </div>
</div>

<!-- 보너스 차감 모달 -->
<div class="overlay" id="modal-deduct-bonus">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="bonus-modal-title">보너스 차감</span>
      <button class="close-btn" onclick="closeModal('deduct-bonus')">✕</button>
    </div>
    <div class="input-row">
      <input class="main-input" id="bonus-input" type="text" inputmode="numeric" placeholder="0"
        oninput="onAmtInput(this,'bonus-korean')">
      <span class="input-unit">원</span>
    </div>
    <div class="korean-input" id="bonus-korean"></div>
    <button class="confirm-btn" onclick="submitDeductBonus()">차감하기</button>
  </div>
</div>

<!-- 목표 수정 모달 -->
<div class="overlay" id="modal-goal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">🎯 생활비 목표 수정</span>
      <button class="close-btn" onclick="closeModal('goal')">✕</button>
    </div>
    <div class="input-row">
      <input class="main-input" id="goal-input" type="text" inputmode="numeric" placeholder="0"
        oninput="onAmtInput(this,'goal-korean')">
      <span class="input-unit">원</span>
    </div>
    <div class="korean-input" id="goal-korean"></div>
    <button class="confirm-btn" onclick="submitGoal()">변경하기</button>
  </div>
</div>

<!-- 월말 정산 모달 -->
<div class="overlay" id="modal-monthend">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">🗓 월말 정산</span>
      <button class="close-btn" onclick="closeModal('monthend')">✕</button>
    </div>
    <div class="preview-box" id="monthend-preview"></div>
    <button class="confirm-btn" onclick="submitMonthEnd()">정산하기 🎊</button>
  </div>
</div>

<script>
const KEY = "adhd-money-v4";
const HINTS = {필수:"이거 안 사면 생활에 문제 생김",여유:"이거 없어도 생활 가능",충동:"깜짝 소비, 고민 없이"};
const COLORS = {필수:"#d4a017",여유:"#f5c842",충동:"#f5a623"};

let S = {living:{goal:1500000,balance:1500000},bonus:0,savings:0,expenses:[],incomeLog:[]};
let expCat = "필수", editCat = "필수", editId = null, incomeType = "night";

// ── utils ──
function load(){try{const d=localStorage.getItem(KEY);if(d)S=JSON.parse(d);}catch{}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch{}}
function fmt(n){return Math.floor(Math.abs(n)).toLocaleString("ko-KR");}
function parseAmt(v){return Number(String(v).replace(/[^0-9]/g,""))||0;}
function fmtInput(v){const n=v.replace(/[^0-9]/g,"");return n?Number(n).toLocaleString("ko-KR"):"";}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function todayKR(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function fmtDate(s){if(!s)return "";const[,m,d]=s.split("-");return `${Number(m)}/${Number(d)}`;}
function toKorean(n){
  const num=Math.floor(Number(n));if(!num||num<=0)return "";
  const units=["","만","억","조"],digits=["","일","이","삼","사","오","육","칠","팔","구"],small=["","십","백","천"];
  let r="",rem=num;
  for(let u=3;u>=0;u--){const unit=Math.pow(10000,u),c=Math.floor(rem/unit);rem%=unit;if(!c)continue;let cs="";for(let s=3;s>=0;s--){const d=Math.floor(c/Math.pow(10,s))%10;if(!d)continue;cs+=(d===1&&s>0?"":digits[d])+small[s];}r+=cs+units[u];}
  return r+"원";
}

// ── flash ──
let flashTimer;
function showFlash(msg,type="ok"){
  const el=document.getElementById("flash");
  el.textContent=msg;
  el.style.background=type==="err"?"#fff8cc":"#fffbe6";
  el.style.color=type==="err"?"#cc2222":"#b8860b";
  el.style.border=`2px solid ${type==="err"?"#ffd966":"#f5c842"}`;
  el.classList.add("show");
  clearTimeout(flashTimer);
  flashTimer=setTimeout(()=>el.classList.remove("show"),2200);
}

// ── render ──
function render(){
  // 생활비
  const bal=S.living.balance, goal=S.living.goal;
  const pct=Math.min(100,Math.max(0,(bal/goal)*100));
  const color=pct>50?"#d4a017":pct>20?"#f0a050":"#cc2222";
  document.getElementById("living-bal").innerHTML=`${fmt(bal)}<span class="won">원</span>`;
  document.getElementById("living-bal").style.color="#1a1a1a";
  document.getElementById("living-korean").textContent=toKorean(bal);
  document.getElementById("living-bar").style.width=pct+"%";
  document.getElementById("living-bar").style.background=color;
  document.getElementById("living-goal-text").textContent=`목표 ${fmt(goal)}원`;

  // 최근 지출
  const rw=document.getElementById("recent-wrap");
  const rl=document.getElementById("recent-list");
  if(S.expenses.length>0){
    rw.style.display="block";
    rl.innerHTML=S.expenses.slice(0,5).map(e=>`
      <div class="recent-row">
        <span class="r-date">${fmtDate(e.date)}</span>
        <span class="r-cat">${e.cat==="필수"?"🍚":e.cat==="여유"?"🙂":"🔥"} ${e.cat}</span>
        <span class="r-amt">-${fmt(e.amount)}원</span>
      </div>`).join("");
  } else { rw.style.display="none"; }

  // 보너스
  document.getElementById("bonus-bal").innerHTML=`${fmt(S.bonus)}<span class="won">원</span>`;
  document.getElementById("bonus-bal").style.color="#1a1a1a";
  document.getElementById("bonus-korean").textContent=toKorean(S.bonus);
  document.getElementById("bonus-luxury").style.opacity=S.bonus<1000000?"0.4":"1";

  // 저축
  document.getElementById("savings-bal").innerHTML=`${fmt(S.savings)}<span class="won">원</span>`;
  document.getElementById("savings-bal").style.color="#1a1a1a";
  document.getElementById("savings-korean").textContent=toKorean(S.savings);

  // 지출 카테고리 합계
  const totals={필수:0,여유:0,충동:0};
  S.expenses.forEach(e=>{totals[e.cat]=(totals[e.cat]||0)+e.amount;});
  document.getElementById("cat-summary").innerHTML=
    ["필수","여유","충동"].map(c=>`
      <div class="cat-box">
        <span class="cat-emoji">${c==="필수"?"🍚":c==="여유"?"🙂":"🔥"}</span>
        <span class="cat-name">${c}</span>
        <span class="cat-amt" style="color:${COLORS[c]}">${fmt(totals[c])}원</span>
      </div>`).join("");

  // 지출 목록
  const el=document.getElementById("exp-list");
  if(S.expenses.length===0){
    el.innerHTML='<div class="empty">아직 지출이 없어요 🌸</div>';
  } else {
    el.innerHTML=S.expenses.map(e=>`
      <div class="exp-row">
        <div class="exp-left">
          <span class="exp-emoji">${e.cat==="필수"?"🍚":e.cat==="여유"?"🙂":"🔥"}</span>
          <div>
            <span class="exp-badge" style="background:${COLORS[e.cat]}22;color:${COLORS[e.cat]}">${e.cat}</span>
            <span class="exp-date"> ${fmtDate(e.date)}</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="exp-amt">-${fmt(e.amount)}원</span>
          <button class="edit-btn" onclick="openEditModal('${e.id}')">수정</button>
        </div>
      </div>`).join("");
  }
}

// ── tabs ──
function switchTab(name,btn){
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("panel-"+name).classList.add("active");
}

// ── modal ──
function openModal(id){document.getElementById("modal-"+id).classList.add("show");}
function closeModal(id){document.getElementById("modal-"+id).classList.remove("show");}

// overlay 클릭으로 닫기
document.querySelectorAll(".overlay").forEach(ov=>{
  ov.addEventListener("click",function(e){if(e.target===this)this.classList.remove("show");});
});

// ── 금액 input 공통 ──
function onAmtInput(inp,koreanId){
  inp.value=fmtInput(inp.value);
  document.getElementById(koreanId).textContent=toKorean(parseAmt(inp.value));
  if(inp.id==="exp-amount-input") checkExpWarn();
}

// ── 지출 입력 ──
function openExpModal(){
  expCat="필수";
  document.getElementById("exp-amount-input").value="";
  document.getElementById("exp-korean").textContent="";
  document.getElementById("exp-warn").style.display="none";
  updateCatBtns("exp-cat-select","exp",expCat);
  document.getElementById("exp-cat-hint").textContent="💬 "+HINTS[expCat];
  openModal("addExp");
  setTimeout(()=>document.getElementById("exp-amount-input").focus(),300);
}
function selectCat(btn,cat,prefix){
  if(prefix==="exp"){expCat=cat;updateCatBtns("exp-cat-select","exp",cat);document.getElementById("exp-cat-hint").textContent="💬 "+HINTS[cat];checkExpWarn();}
  else{editCat=cat;updateCatBtns("edit-cat-select","edit",cat);document.getElementById("edit-cat-hint").textContent="💬 "+HINTS[cat];}
}
function updateCatBtns(selectId,prefix,active){
  document.querySelectorAll(`#${selectId} .cat-btn`).forEach(b=>{
    b.className="cat-btn";
    if(b.textContent.includes(active==="필수"?"필수":active==="여유"?"여유":"충동"))b.classList.add("active-"+active);
  });
}
function checkExpWarn(){
  const amt=parseAmt(document.getElementById("exp-amount-input").value);
  const show=expCat!=="충동"&&amt>S.living.balance&&amt>0;
  document.getElementById("exp-warn").style.display=show?"block":"none";
}
function submitExp(){
  const amt=parseAmt(document.getElementById("exp-amount-input").value);
  if(!amt)return;
  if(expCat!=="충동"&&S.living.balance<amt){showFlash("잔액이 부족합니다. 💸","err");return;}
  S.living.balance-=amt;
  S.expenses.unshift({id:uid(),cat:expCat,amount:amt,date:todayKR()});
  save();render();
  showFlash(`-${fmt(amt)}원 기록됨 ✅`);
  closeModal("addExp");
}

// ── 지출 수정 ──
function openEditModal(id){
  const exp=S.expenses.find(e=>e.id===id);if(!exp)return;
  editId=id;editCat=exp.cat;
  document.getElementById("edit-amount-input").value=fmt(exp.amount);
  document.getElementById("edit-korean").textContent=toKorean(exp.amount);
  updateCatBtns("edit-cat-select","edit",editCat);
  document.getElementById("edit-cat-hint").textContent="💬 "+HINTS[editCat];
  openModal("editExp");
}
function submitEdit(){
  const newAmt=parseAmt(document.getElementById("edit-amount-input").value);
  if(!newAmt)return;
  const old=S.expenses.find(e=>e.id===editId);if(!old)return;
  const diff=newAmt-old.amount;
  if(editCat!=="충동"&&diff>0&&S.living.balance<diff){showFlash("잔액이 부족합니다. 💸","err");return;}
  S.living.balance-=diff;
  S.expenses=S.expenses.map(e=>e.id===editId?{...e,cat:editCat,amount:newAmt}:e);
  save();render();showFlash("수정됐어요 ✏️");closeModal("editExp");
}
function submitDelete(){
  const exp=S.expenses.find(e=>e.id===editId);if(!exp)return;
  S.living.balance+=exp.amount;
  S.expenses=S.expenses.filter(e=>e.id!==editId);
  save();render();showFlash("삭제됐어요 🗑");closeModal("editExp");
}

// ── 수입 ──
function selectIncomeType(t){
  incomeType=t;
  document.querySelectorAll(".type-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("itype-"+t).classList.add("active");
  updateIncomePreview();
}
function updateIncomePreview(){
  const amt=parseAmt(document.getElementById("income-input").value);
  const box=document.getElementById("income-preview");
  if(!amt){box.style.display="none";return;}
  let txt="";
  if(incomeType==="night") txt=`보너스 ${fmt(amt*.5)}원\n저축 ${fmt(amt*.3)}원\n생활비 ${fmt(amt*.2)}원`;
  else if(incomeType==="duty") txt=`보너스 ${fmt(amt*.5)}원\n생활비 ${fmt(amt*.5)}원`;
  else txt=`저축 ${fmt(amt*.5)}원\n보너스 ${fmt(amt*.3)}원\n생활비 ${fmt(amt*.2)}원`;
  box.textContent=txt;box.style.display="block";
}
function submitIncome(){
  const amt=parseAmt(document.getElementById("income-input").value);if(!amt)return;
  let b=0,sv=0,lv=0,label="";
  if(incomeType==="night")     {b=amt*.5;sv=amt*.3;lv=amt*.2;label="나이트 수당";}
  else if(incomeType==="duty") {b=amt*.5;lv=amt*.5;label="당직비";}
  else                         {sv=amt*.5;b=amt*.3;lv=amt*.2;label="상여금";}
  S.living.balance+=lv;S.bonus+=b;S.savings+=sv;
  S.incomeLog.unshift({type:label,amount:amt,at:Date.now()});
  if(S.incomeLog.length>20)S.incomeLog.pop();
  save();render();showFlash(`+${fmt(amt)}원 분배 완료 🎉`);closeModal("income");
  document.getElementById("income-input").value="";
  document.getElementById("income-korean").textContent="";
  document.getElementById("income-preview").style.display="none";
}

// ── 보너스 차감 ──
function handleBonus(label,min){
  if(S.bonus<min){showFlash("100만원 이상 모이면 사용 가능 💎","err");return;}
  document.getElementById("bonus-modal-title").textContent=label;
  document.getElementById("bonus-input").value="";
  document.getElementById("bonus-korean").textContent="";
  openModal("deduct-bonus");
}
function submitDeductBonus(){
  const n=parseAmt(document.getElementById("bonus-input").value);if(!n)return;
  if(n>S.bonus){showFlash("잔액이 부족합니다. 💸","err");return;}
  S.bonus-=n;save();render();showFlash(`-${fmt(n)}원`);closeModal("deduct-bonus");
}

// ── 목표 수정 ──
function openGoalModal(){
  document.getElementById("goal-input").value=fmt(S.living.goal);
  document.getElementById("goal-korean").textContent=toKorean(S.living.goal);
  openModal("goal");
}
function submitGoal(){
  const ng=parseAmt(document.getElementById("goal-input").value);
  const used=S.living.goal-S.living.balance;
  if(ng<used){showFlash("이미 사용한 금액보다 낮게 설정 불가","err");return;}
  S.living.balance+=ng-S.living.goal;S.living.goal=ng;
  save();render();showFlash("목표 금액 변경됨 ✨");closeModal("goal");
}

// ── 월말 정산 ──
function openMonthEnd(){
  const left=Math.max(0,S.living.balance);
  document.getElementById("monthend-preview").textContent=
    `남은 ${fmt(left)}원 중\n✅ 70%  →  ${fmt(left*.7)}원  다음달 생활비\n🎀 30%  →  ${fmt(left*.3)}원  보너스 슬롯`;
  openModal("monthend");
}
function submitMonthEnd(){
  const left=Math.max(0,S.living.balance);
  S.living.balance=left*.7;S.bonus+=left*.3;
  save();render();showFlash("월말정산 완료! 🎊");closeModal("monthend");
}

// ── init ──
load();render();
</script>
</body>
</html>
